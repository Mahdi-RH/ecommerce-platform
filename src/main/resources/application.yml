spring:
  application:
    name: ecommerce-bazzarly

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # IMPORTANT
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

ecommerce:
  bazzarly:
    security:
        jwt:
            secret: bXktc3VwZXItc2VjcmV0LWtleS0zMmJ5dGVzLWxvbmc=
            expiration: 3600000  # 1 hour in ms
